<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon — overridden at runtime by useSeoMeta -->
    <link rel="icon" type="image/webp" href="/images/IMG_2832.webp" />

    <!-- Baseline — overridden at runtime by useSeoMeta -->
    <title>Cabin Rental | Cabinly</title>
    <meta name="description" content="Find and book unique cabin stays." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />

    <!-- Preconnect to image CDNs used in cabin data -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- DNS-prefetch for analytics / maps (add as needed) -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />

    <!-- Non-blocking font load -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/switzer" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.cdnfonts.com/css/switzer" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
